<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <title>Hoops — Three.js Port</title>
  <style>
    html, body {
      margin: 0; padding: 0; overflow: hidden;
      width: 100%; height: 100%;
      background: #0a0a0f;
      touch-action: none;
      -webkit-user-select: none; user-select: none;
      overscroll-behavior: none;
    }
    #app { position: fixed; inset: 0; }
    #app canvas { display: block; touch-action: none; }
    #hud {
      position: fixed; top: env(safe-area-inset-top, 12px); left: 0; right: 0;
      display: flex; justify-content: center; pointer-events: none;
      font-family: -apple-system, "Helvetica Neue", Arial, sans-serif;
    }
    #score {
      margin-top: 10px; padding: 6px 22px; border-radius: 999px;
      background: rgba(10, 10, 18, 0.55); backdrop-filter: blur(8px);
      color: #fff; font-size: 28px; font-weight: 800; letter-spacing: 1px;
      text-shadow: 0 2px 8px rgba(0,0,0,.6);
    }
    #toast {
      position: fixed; top: 22%; left: 0; right: 0; text-align: center;
      pointer-events: none; font-family: -apple-system, "Helvetica Neue", Arial, sans-serif;
      color: #ffd54a; font-size: 44px; font-weight: 900; letter-spacing: 2px;
      text-shadow: 0 3px 14px rgba(0,0,0,.7); opacity: 0;
      transition: opacity .12s ease-out, transform .12s ease-out;
      transform: scale(0.8);
    }
    #toast.show { opacity: 1; transform: scale(1); }
  </style>
  <script type="module" crossorigin src="./assets/index-CNQbeci0.js"></script>
</head>
<body>
  <div id="app"></div>
  <div id="hud"><div id="score">0</div></div>
  <div id="toast"></div>
</body>
</html>
